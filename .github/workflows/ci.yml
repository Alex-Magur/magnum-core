name: Forge Core CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-and-evals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Trivy Vulnerability Scanner (CVE-Gate)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          severity: 'CRITICAL'
          exit-code: '1' # Жесткий Gate: фейлит пайплайн при наличии CRITICAL CVE

      - name: Acceptance Criteria Evals
        run: echo "Здесь будет запуск тестов Phase 0 (MRR/Recall, Security Coverage, DoS Safety)."

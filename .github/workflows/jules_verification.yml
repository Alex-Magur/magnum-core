name: Jules Workspace Verification

on:
  push:
    branches:
      - jules-workspace

jobs:
  test_and_merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio python-dotenv \
                      cryptography httpx pyjwt motor
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Tests
        run: |
          pytest tests/

      - name: Merge to Approved Code on Success
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "Jules-Automaton"
          git config --global user.email "jules@magnum.co"
          git checkout approved_code
          git merge jules-workspace
          git push origin approved_code
name: Jules Verification
on:
  push:
    branches: [jules-workspace]
jobs:
  test_and_merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12' # Поднимаем до нужной тестам
      - name: Install
        run: |
          pip install pytest pytest-asyncio python-dotenv cryptography httpx pyjwt motor python-jose[cryptography] fastapi pydantic pydantic-settings
      - name: Run
        run: |
          mkdir -p models_data # Создаем заглушку, чтобы тест не падал
          export PYTHONPATH=$PYTHONPATH:$(pwd)/services/forge_api/src
          pytest tests/
      - name: Merge
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "Jules-Automaton"
          git config --global user.email "jules@magnum.co"
          git checkout approved_code
          git merge jules-workspace
          git push origin approved_code
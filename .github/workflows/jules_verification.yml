name: Jules Verification
on:
  push:
    branches: [jules-workspace]

# Выдаем боту права на запись в репозиторий
permissions:
  contents: write

jobs:
  test_and_merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install
        run: |
          pip install pytest pytest-asyncio python-dotenv cryptography httpx pyjwt motor python-jose[cryptography] fastapi pydantic pydantic-settings respx
      - name: Run Tests (Phase 1 Only)
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/services/forge_api/src:$(pwd)/libs/forge_retrieval/src
          pytest tests/phase1/
      - name: Merge
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "Jules-Automaton"
          git config --global user.email "jules@magnum.co"
          git checkout approved_code
          git merge jules-workspace
          git push origin approved_code

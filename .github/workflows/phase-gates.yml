name: Phase Gates — Acceptance Criteria Evals

on:
  pull_request:
    branches: [ "main" ]

jobs:
  phase-0:
    name: "Phase 0: Benchmarks & CI Evals"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install Dependencies
        run: uv sync --all-packages
      - name: Run Phase 0 Tests
        run: uv run pytest tests/phase0/ -v -m phase0

  phase-1:
    name: "Phase 1: Foundation, mTLS, OAuth (Hard Gate 1)"
    needs: phase-0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-packages
      - run: uv run pytest tests/phase1/ -v -m phase1

  phase-2:
    name: "Phase 2: Execution, Supply-Chain, SSRF (Hard Gate 2)"
    needs: phase-1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-packages
      - run: uv run pytest tests/phase2/ -v -m phase2

  phase-3:
    name: "Phase 3: Retrieval, Reranker (Hard Gate 3)"
    needs: phase-2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-packages
      - run: uv run pytest tests/phase3/ -v -m phase3

  phase-4:
    name: "Phase 4: Graph, Idempotency, Sampling (Hard Gate 4)"
    needs: phase-3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-packages
      - run: uv run pytest tests/phase4/ -v -m phase4

  phase-5:
    name: "Phase 5: SLM, A2A, Observability (Hard Gate 5)"
    needs: phase-4
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-packages
      - run: uv run pytest tests/phase5/ -v -m phase5
